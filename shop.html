<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f1f5f9;
            color: #0f172a;
        }

        .panel {
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            background-color: #ffffff;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
        }

        .title {
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .form-control {
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }

        .form-control:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 .2rem rgba(15, 23, 42, 0.15);
        }

        .btn-solid {
            background-color: #0f172a;
            border-color: #0f172a;
            color: #ffffff;
            font-weight: 600;
        }

        .btn-solid:hover,
        .btn-solid:focus {
            background-color: #1e293b;
            border-color: #1e293b;
            color: #cbd5e1;
        }

        .array-box {
            border: 1px solid #e2e8f0;
            border-radius: 0.875rem;
            background-color: #f8fafc;
        }

        .array-item {
            border: 1px solid #dbe3ee;
            border-radius: 0.5rem;
            background-color: #ffffff;
            padding: 0.65rem 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <main class="container d-flex align-items-center min-vh-100 py-5">
        <section class="panel w-100 mx-auto p-4 p-md-5" style="max-width: 760px;">
            <h1 class="title fs-2 fs-md-1 mb-2">Mini Mart</h1>
            <h5 class="fs-6">Add your product</h5>
            <div class="alert alert-danger" style="display: none;" id="errMsg">
                Input cannot be empty
            </div>

            <div class="row g-2 g-md-3 align-items-stretch">
                <div class="col-12 col-md">
                    <input type="text" placeholder="Enter item" class="form-control form-control-lg" id="itemInput" />
                </div>
                <div class="col-12 col-md-auto d-grid">
                    <button class="btn btn-solid btn-lg px-4" onclick="addItem()">Add Item</button>
                </div>
                <!-- <div id="show">Items added will show here</div> -->
            </div>

            <section class="array-box mt-4 p-3 p-md-4" style="display: none;" id="product">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h5 mb-0">Product Section</h2>
                    <span class="badge text-bgdark text-dark" id="itemCount">0 </span>
                </div>
                <ul class="list-unstyled mb-0 d-grid gap-2" id="arrayList">
                    <li class="text-secondary" id="emptySection"></li>
                </ul>
            </section>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="./shop.js"></script>
</body>
</html>
